# Nginx configuration for ibdl.thetransformix.com
# Place this file at /etc/nginx/sites-available/ibdl.thetransformix.com

server {
    listen 80;
    server_name ibdl.thetransformix.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS (enable after SSL setup)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ---- BACKEND API (proxy to FastAPI on port 8000) ----
    location /api/ {
        proxy_pass http://127.0.0.1:9005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for PDF generation endpoints
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Support large file uploads/downloads (PDF reports)
        client_max_body_size 100M;
    }

    # ---- FRONTEND (proxy to Next.js on port 3000) ----
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # For Next.js hot reload (dev only, harmless in prod)
        proxy_read_timeout 86400;
    }
}

