version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: quality_platform/backend/Dockerfile
    ports:
      - "0.0.0.0:9005:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/quality_platform/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    ports:
      - "0.0.0.0:9000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s