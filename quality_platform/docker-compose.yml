version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: quality_platform/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/quality_platform/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "9000:3000"
    restart: unless-stopped
    depends_on:
      - backend